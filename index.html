<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Finance Tracker</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
color:#333;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input, select, button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#007AFF;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#005ec4;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.progress{
height:20px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
background:green;
width:0%;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th, td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#007AFF;
color:white;
}

.small{
font-size:14px;
color:#555;
}
</style>
</head>

<body>

<div class="container">

<h1>🚗 Vehicle Finance Tracker</h1>

<div class="card">
<h3>Vehicle Details</h3>

<input id="vehicleName" placeholder="Vehicle Name (e.g. Audi TT)">
<input id="price" type="number" placeholder="Purchase Price">
<input id="monthly" type="number" placeholder="Monthly Installment">

<button onclick="saveVehicle()">Save Vehicle</button>

<div class="small" id="vehicleInfo"></div>
</div>

<div class="card">
<h3>Finance Overview</h3>

<div class="grid">
<div>Total Price: <b id="totalPrice">R0</b></div>
<div>Paid: <b id="paid">R0</b></div>
<div>Remaining: <b id="remaining">R0</b></div>
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>
</div>

<div class="card">
<h3>Add Payment</h3>

<input type="date" id="date">
<input type="number" id="amount" placeholder="Amount Paid">

<button onclick="addPayment()">Add Payment</button>
</div>

<div class="card">
<h3>Running Costs</h3>

<input type="number" id="fuel" placeholder="Fuel Cost">
<input type="number" id="insurance" placeholder="Insurance">
<input type="number" id="repairs" placeholder="Repairs">

<button onclick="saveCosts()">Save Costs</button>

<div class="small" id="costSummary"></div>
</div>

<div class="card">
<h3>Payment History</h3>

<table>
<thead>
<tr>
<th>Date</th>
<th>Amount</th>
<th></th>
</tr>
</thead>
<tbody id="payments"></tbody>
</table>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("vehicle_finance")) || {
vehicle:"",
price:0,
monthly:0,
payments:[],
costs:{fuel:0,insurance:0,repairs:0}
};

function save(){
localStorage.setItem("vehicle_finance", JSON.stringify(data));
}

function saveVehicle(){
data.vehicle = document.getElementById("vehicleName").value;
data.price = Number(document.getElementById("price").value);
data.monthly = Number(document.getElementById("monthly").value);
save();
render();
}

function addPayment(){
data.payments.unshift({
date: document.getElementById("date").value,
amount: Number(document.getElementById("amount").value)
});
save();
render();
}

function deletePayment(i){
data.payments.splice(i,1);
save();
render();
}

function saveCosts(){
data.costs.fuel = Number(document.getElementById("fuel").value);
data.costs.insurance = Number(document.getElementById("insurance").value);
data.costs.repairs = Number(document.getElementById("repairs").value);
save();
render();
}

function render(){

document.getElementById("vehicleInfo").innerText =
data.vehicle ? "Tracking: " + data.vehicle : "";

document.getElementById("totalPrice").innerText = "R" + data.price.toFixed(2);

let paid = data.payments.reduce((a,b)=>a+b.amount,0);
let remaining = data.price - paid;

document.getElementById("paid").innerText = "R" + paid.toFixed(2);
document.getElementById("remaining").innerText = "R" + remaining.toFixed(2);

let percent = data.price ? (paid/data.price)*100 : 0;
document.getElementById("bar").style.width = percent + "%";

let tbody = "";
data.payments.forEach((p,i)=>{
tbody += `
<tr>
<td>${p.date}</td>
<td>R${p.amount.toFixed(2)}</td>
<td><button onclick="deletePayment(${i})">X</button></td>
</tr>
`;
});
document.getElementById("payments").innerHTML = tbody;

let totalCosts =
data.costs.fuel + data.costs.insurance + data.costs.repairs;

document.getElementById("costSummary").innerText =
`Monthly Costs: R${totalCosts.toFixed(2)}`;

}

render();

</script>

</body>
</html>
